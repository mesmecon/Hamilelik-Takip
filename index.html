<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merve'nin Hamilelik Takibi</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #fdf8ff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #1a1a1a; }
.app { max-width: 420px; margin: 0 auto; padding: 1.25rem 1rem 3rem; }
.card { background: #fff; border: 0.5px solid #e8e0f0; border-radius: 20px; padding: 1.5rem; margin-bottom: 12px; }
.hero-label { font-size: 11px; color: #888; font-weight: 600; letter-spacing: 0.6px; margin-bottom: 8px; }
.hero-weeks { display: flex; align-items: baseline; gap: 8px; margin-bottom: 12px; }
.num { font-size: 52px; font-weight: 600; line-height: 1; color: #2d1a4a; }
.num2 { font-size: 34px; font-weight: 600; line-height: 1; color: #2d1a4a; }
.lbl { font-size: 18px; color: #888; }
.lbl2 { font-size: 16px; color: #888; }
.badges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.badge { display: inline-flex; align-items: center; gap: 5px; border-radius: 20px; padding: 4px 12px; font-size: 12px; font-weight: 500; }
.badge-purple { background: #f0e6f6; color: #7a3a9a; }
.badge-blue { background: #e6f0fa; color: #2a5a9a; }
.progress-row { display: flex; justify-content: space-between; font-size: 12px; color: #888; margin-bottom: 6px; }
.progress-bar { height: 6px; border-radius: 3px; background: #ede8f5; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, #c9a0dc, #a0b8e0); }
.fruit-row { display: flex; align-items: center; gap: 20px; }
.fruit-icon { width: 80px; height: 80px; border-radius: 16px; background: #fdf3e3; display: flex; align-items: center; justify-content: center; font-size: 48px; flex-shrink: 0; }
.fruit-label { font-size: 11px; color: #888; font-weight: 600; letter-spacing: 0.5px; margin-bottom: 4px; }
.fruit-name { font-size: 22px; font-weight: 600; color: #2d1a4a; margin-bottom: 4px; }
.fruit-stats { font-size: 13px; color: #888; display: flex; gap: 12px; }
.fruit-stats b { color: #2d1a4a; }
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.info-card { background: #fff; border: 0.5px solid #e8e0f0; border-radius: 16px; padding: 1rem; }
.info-title { font-size: 11px; font-weight: 600; letter-spacing: 0.5px; color: #888; margin-bottom: 10px; }
.info-item { display: flex; gap: 6px; margin-bottom: 7px; align-items: flex-start; }
.dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
.dot-blue { background: #a0c4d4; }
.dot-purple { background: #c9a0dc; }
.info-text { font-size: 12px; color: #333; line-height: 1.5; }
.name-card { background: #fff; border: 0.5px solid #e8e0f0; border-radius: 20px; padding: 1.5rem; }
.name-btn { width: 100%; padding: 14px; border-radius: 12px; border: 0.5px solid #d0b8e8; background: #f5eefa; cursor: pointer; font-size: 15px; color: #7a3a9a; font-weight: 600; }
.name-display { text-align: center; padding: 8px 0 16px; border-bottom: 0.5px solid #ede8f5; margin-bottom: 14px; }
.name-text { font-size: 40px; font-weight: 600; color: #2d1a4a; margin-bottom: 4px; }
.name-meaning { font-size: 13px; color: #888; font-style: italic; }
.name-btns { display: flex; gap: 8px; }
.btn-dislike { flex: 1; padding: 12px 0; border-radius: 12px; border: 0.5px solid #f5c0c0; background: #fff5f5; cursor: pointer; font-size: 20px; }
.btn-skip { flex: 2; padding: 12px 0; border-radius: 12px; border: 0.5px solid #ddd; background: #f8f8f8; cursor: pointer; font-size: 13px; color: #666; font-weight: 500; }
.btn-like { flex: 1; padding: 12px 0; border-radius: 12px; border: 0.5px solid #b0ddb0; background: #f0fff0; cursor: pointer; font-size: 20px; }
.liked-box { margin-top: 14px; padding: 10px 12px; border-radius: 10px; background: #f0fff0; border: 0.5px solid #b0ddb0; }
.liked-title { font-size: 11px; color: #3a7a3a; font-weight: 600; margin-bottom: 4px; letter-spacing: 0.5px; }
.liked-names { font-size: 13px; color: #333; }
.loading { text-align: center; padding: 24px 0; color: #aaa; font-size: 14px; }
.error { text-align: center; padding: 12px; color: #c00; font-size: 13px; }
</style>
</head>
<body>
<div class="app">

<div class="card">
  <div class="hero-label">MERVE'NIN HAMILELIK TAKIBI</div>
  <div class="hero-weeks">
    <span class="num" id="hw">-</span><span class="lbl">hafta</span>
    <span class="num2" id="hd">-</span><span class="lbl2">gun</span>
  </div>
  <div class="badges">
    <div class="badge badge-purple" id="tri">-</div>
    <div class="badge badge-blue"><span id="dleft">-</span> gun kaldi</div>
  </div>
  <div class="progress-row">
    <span>%<span id="pct">0</span> tamamlandi</span>
    <span>2 Eki 2026</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="pfill" style="width:0%"></div></div>
</div>

<div class="card">
  <div class="fruit-row">
    <div class="fruit-icon"><span id="femoji">🍊</span></div>
    <div>
      <div class="fruit-label">BEBEGIN BUYUKLUGU</div>
      <div class="fruit-name" id="fname"><span class="loading">Yukleniyor...</span></div>
      <div class="fruit-stats" id="fstats" style="display:none">
        boy <b id="fsize">-</b> cm &nbsp; agirlik <b id="fweight">-</b>
      </div>
    </div>
  </div>
</div>

<div class="info-grid">
  <div class="info-card">
    <div class="info-title">👶 Bebek</div>
    <div id="baby-facts"><div class="loading">Yukleniyor...</div></div>
  </div>
  <div class="info-card">
    <div class="info-title">🤰 Anne</div>
    <div id="mom-facts"><div class="loading">Yukleniyor...</div></div>
  </div>
</div>

<div class="name-card" id="name-card">
  <button class="name-btn" onclick="startName()">Isim Oner ✨</button>
</div>

</div>
<script>
var API_KEY = 'AIzaSyDD7OtBSeNU9yq70F0Sc6hz_AccSANT-k8';
var START = new Date('2025-12-27');
var DUE = new Date('2026-10-02');
var usedNames = [];
var liked = [];
var disliked = [];
var currentName = null;

function calcDates() {
  var today = new Date();
  today.setHours(0,0,0,0);
  var s = new Date(START);
  s.setHours(0,0,0,0);
  var d = new Date(DUE);
  d.setHours(0,0,0,0);
  var diff = Math.floor((today - s) / 86400000);
  var weeks = Math.floor(diff / 7);
  var days = diff % 7;
  var pct = Math.min(100, Math.round((diff / 280) * 100));
  var left = Math.max(0, Math.floor((d - today) / 86400000));
  var tri = weeks < 13 ? '1. Trimester' : (weeks < 27 ? '2. Trimester' : '3. Trimester');
  return { weeks: weeks, days: days, pct: pct, left: left, tri: tri };
}

function gemini(prompt) {
  var url = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + API_KEY;
  return fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }],
      generationConfig: { temperature: 0.7 }
    })
  }).then(function(res) {
    return res.json();
  }).then(function(data) {
    var text = '';
    if (data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0]) {
      text = data.candidates[0].content.parts[0].text;
    }
    return text.replace(/```json|```/g, '').trim();
  });
}

function loadWeekInfo(weeks) {
  var prompt = 'Sen bir kadin dogum uzmanisin. Turkce yanitla. Sadece JSON dondur, baska hicbir sey yazma.\n' +
    weeks + '. hamilelik haftasi icin bilgi ver. Bebek erkek.\n' +
    'Format: {"fruit":"bebegin boyutuna uygun meyve veya sebze, Turkce, bas harf buyuk","emoji":"tek emoji","size_cm":sayi,"weight_g":sayi,"baby_facts":["3 kisa madde bebek gelisimi"],"mom_facts":["3 kisa madde annedeki degisimler"]}';
  gemini(prompt).then(function(raw) {
    var d = JSON.parse(raw);
    document.getElementById('femoji').textContent = d.emoji || '🍊';
    document.getElementById('fname').textContent = 'Bir ' + (d.fruit || '-') + ' Kadar';
    document.getElementById('fsize').textContent = d.size_cm || '-';
    document.getElementById('fweight').textContent = d.weight_g ? d.weight_g + ' g' : '-';
    document.getElementById('fstats').style.display = 'flex';
    renderFacts('baby-facts', d.baby_facts || [], 'dot-blue');
    renderFacts('mom-facts', d.mom_facts || [], 'dot-purple');
  }).catch(function() {
    document.getElementById('fname').innerHTML = '<span class="error">Yuklenemedi, sayfayi yenile</span>';
    document.getElementById('baby-facts').innerHTML = '';
    document.getElementById('mom-facts').innerHTML = '';
  });
}

function renderFacts(id, facts, dotClass) {
  var html = '';
  for (var i = 0; i < facts.length; i++) {
    html += '<div class="info-item"><div class="dot ' + dotClass + '"></div><div class="info-text">' + facts[i] + '</div></div>';
  }
  document.getElementById(id).innerHTML = html;
}

function startName() { fetchName(); }

function fetchName() {
  var area = document.getElementById('name-card');
  area.innerHTML = '<div class="loading">Dusunuyor... ✨</div>';
  var likedStr = liked.length ? 'Begenilen isimler: ' + liked.join(', ') + '. Benzer tarzda oner.' : '';
  var dislikedStr = disliked.length ? 'Begenilmeyen isimler: ' + disliked.join(', ') + '. Bunlardan uzak dur.' : '';
  var usedStr = usedNames.length ? 'Daha once onerilenler (tekrar onerme): ' + usedNames.join(', ') + '.' : '';
  var prompt = 'Turkce kokenli erkek bebek ismi oner. Sadece JSON dondur, baska hicbir sey yazma.\n' +
    likedStr + ' ' + dislikedStr + ' ' + usedStr + '\n' +
    'Format: {"name":"Isim","meaning":"Anlami max 6 kelime"}\n' +
    'Turkce kokenli, guzel, anlamli isimler, Orta Asya ve Turk kulturunden.';
  gemini(prompt).then(function(raw) {
    var d = JSON.parse(raw);
    if (d.name) {
      usedNames.push(d.name);
      currentName = d;
      renderName(d);
    }
  }).catch(function() {
    area.innerHTML = '<div class="error">Yuklenemedi.</div><button class="name-btn" onclick="fetchName()">Tekrar Dene</button>';
  });
}

function renderName(d) {
  var area = document.getElementById('name-card');
  area.innerHTML =
    '<div class="name-display">' +
    '<div class="name-text">' + d.name + '</div>' +
    '<div class="name-meaning">' + d.meaning + '</div>' +
    '</div>' +
    '<div class="name-btns">' +
    '<button class="btn-dislike" onclick="handleDislike()">👎</button>' +
    '<button class="btn-skip" onclick="fetchName()">Baska Oner</button>' +
    '<button class="btn-like" onclick="handleLike()">👍</button>' +
    '</div>' +
    '<div id="liked-box"></div>';
  renderLiked();
}

function handleLike() {
  if (!currentName) return;
  if (liked.indexOf(currentName.name) === -1) liked.push(currentName.name);
  disliked = disliked.filter(function(n) { return n !== currentName.name; });
  fetchName();
}

function handleDislike() {
  if (!currentName) return;
  if (disliked.indexOf(currentName.name) === -1) disliked.push(currentName.name);
  liked = liked.filter(function(n) { return n !== currentName.name; });
  fetchName();
}
apı
function renderLiked() {
  var box = document.getElementById('liked-box');
  if (!box || liked.length === 0) return;
  box.innerHTML =
    '<div class="liked-box">' +
    '<div class="liked-title">BEGENILEN ISIMLER</div>' +
    '<div class="liked-names">' + liked.join(' - ') + '</div>' +
    '</div>';
}

(function() {
  var c = calcDates();
  document.getElementById('hw').textContent = c.weeks;
  document.getElementById('hd').textContent = c.days;
  document.getElementById('pct').textContent = c.pct;
  document.getElementById('dleft').textContent = c.left;
  document.getElementById('tri').textContent = c.tri;
  document.getElementById('pfill').style.width = c.pct + '%';
  loadWeekInfo(c.weeks);
})();
</script>
</body>
</html>
